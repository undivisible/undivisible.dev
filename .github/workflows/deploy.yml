name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: WASM target + wasm-bindgen
        run: |
          rustup target add wasm32-unknown-unknown --toolchain stable
          cargo install wasm-bindgen-cli --locked
          echo "CARGO=$(rustup which --toolchain stable cargo)" >> "$GITHUB_ENV"
          echo "RUSTC=$(rustup which --toolchain stable rustc)" >> "$GITHUB_ENV"

      - name: Cache Cargo (crepuscularity clone)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            /tmp/crepuscularity-gha -> target

      - name: Clone crepuscularity (web-v3)
        run: |
          rm -rf /tmp/crepuscularity-gha
          git clone --depth 1 --branch web-v3 \
            https://github.com/semitechnological/crepuscularity.git \
            /tmp/crepuscularity-gha

      - name: Build crepus CLI
        run: |
          cd /tmp/crepuscularity-gha
          cargo build --release -p crepuscularity-cli --no-default-features

      - name: crepus web build (.crepus + WASM → dist/)
        run: |
          /tmp/crepuscularity-gha/target/release/crepus web build \
            --site "${GITHUB_WORKSPACE}/crepuscularity-site" \
            --out-dir "${GITHUB_WORKSPACE}/dist"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
