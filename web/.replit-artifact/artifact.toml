kind = "web"
previewPath = "/"
title = "undivisible.dev"
version = "1.0.0"
id = "web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19669

[services.development]
run = "bun run dev"

[services.production]
build = [ "bun", "run", "build:web" ]
publicDir = "web/out"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19669"
BASE_PATH = "/"
