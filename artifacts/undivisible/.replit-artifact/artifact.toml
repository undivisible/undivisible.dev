kind = "web"
previewPath = "/"
title = "undivisible.dev"
version = "1.0.0"
id = "artifacts/undivisible"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19669

[services.development]
run = "pnpm --filter @workspace/undivisible run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/undivisible", "run", "build" ]
publicDir = "artifacts/undivisible/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19669"
BASE_PATH = "/"
