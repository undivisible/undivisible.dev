# Undivisible.dev Workflow Ui Component Update

## Action

Follow the ui-component-update workflow:
1. Edit one or more files in src/components (e.g., Info.tsx, PrintActions.tsx) to adjust UI behavior or appearance.
2. Possibly update related hooks or utility files in src/lib if the UI change depends on theme or state logic.
3. Test changes on relevant viewports (mobile/desktop).

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: artifacts/undivisible/src/components/Info.tsx, artifacts/undivisible/src/components/PrintActions.tsx, artifacts/undivisible/src/lib/useHongKongDayTheme.ts

